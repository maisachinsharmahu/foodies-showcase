dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/
    - assets/Onboard/
    - assets/images/
    - assets/images/Blob/
    - assets/images/avatars/
    - assets/images/avatars2/
    - assets/images/home/
    - assets/images/home/Items/
    - assets/images/home/abstract-stage-spotlight-focus/
    - assets/images/types/
    - assets/images/types/cat/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/Poppin/Poppins-Regular.ttf
        - asset: assets/Poppin/Poppins-Bold.ttf
          weight: 700
        - asset: assets/Poppin/Poppins-SemiBold.ttf
          weight: 600

    - family: Metropolis
      fonts:
        - asset: assets/metropolis/Metropolis-Regular.otf
        - asset: assets/metropolis/Metropolis-Bold.otf
          weight: 700
        - asset: assets/metropolis/Metropolis-Medium.otf
          weight: 500

    - family: Acme
      fonts:
        - asset: assets/Acme/Acme-Regular.ttf

    - family: Bree
      fonts:
        - asset: assets/Bree/BreeSerif-Regular.ttf

    - family: Kalam
      fonts:
        - asset: assets/Kalam/Kalam-Regular.ttf
        - asset: assets/Kalam/Kalam-Bold.ttf
          weight: 700

    - family: Caveat
      fonts:
        - asset: assets/curseive/static/Caveat-Regular.ttf
        - asset: assets/curseive/static/Caveat-Bold.ttf
          weight: 700
